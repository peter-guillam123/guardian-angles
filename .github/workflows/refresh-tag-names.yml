name: Refresh tag names from CAPI

# Pulls authoritative webTitles for every tag in the catalogue from
# the Guardian's /tags CAPI endpoint and writes data/tag-names.json.
# This picks up tag renames (e.g. "Brexit Party" → "Reform UK") that
# slug-derived names can't catch.
#
# Scheduled monthly since Guardian tag renames are rare, plus manual
# trigger for on-demand refreshes.

on:
  schedule:
    - cron: '0 3 1 * *'   # 03:00 UTC on the 1st of every month
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r build/requirements.txt

      - name: Fetch tag names from CAPI
        env:
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
        run: python build/fetch_tag_names.py

      - name: Rebuild catalogue with fresh names
        env:
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
        run: python build/build_tag_index.py

      - name: Commit refreshed names
        run: |
          git config user.name "guardian-angles-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/tag-names.json data/tag-catalog.json data/tag-index-*.json.gz
          if git diff --cached --quiet; then
            echo "No name changes to commit."
          else
            git commit -m "data: refresh tag names from CAPI"
            for attempt in 1 2 3 4 5; do
              if git push; then break; fi
              git pull --rebase --strategy-option=theirs
            done
          fi
