name: Build Guardian Angles data

on:
  schedule:
    # Hourly at :07 past. GitHub docs warn that scheduled runs at the
    # top of the hour get deprioritised under load; picking :07 and a
    # 60-minute cadence gives us far more reliable firing than the
    # */30 cadence we had before. Once the dataset is complete the
    # runs become no-ops anyway; we can slow to daily then.
    - cron: '7 * * * *'
  workflow_dispatch:      # manual trigger from the Actions tab
  push:
    branches: [ main ]    # any push to main → redeploy existing data

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: build/requirements.txt

      - name: Install dependencies
        run: pip install -r build/requirements.txt

      - name: Batch fetch (small chunk per run — rate-limit friendly)
        # Only fetch on schedule / manual dispatch. Pushes of code just
        # rebuild indexes + redeploy; they don't hit the Guardian API.
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
        run: python build/batch_fetch.py

      - name: Rebuild indexes
        run: |
          python build/build_index.py
          python build/build_tag_index.py

      - name: Commit updated data
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "guardian-angles-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "data: batch fetch + rebuild"
            git push
          fi

  deploy:
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out (with any newly-committed data)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
