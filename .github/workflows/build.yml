name: Build Guardian Trends data

on:
  schedule:
    - cron: '0 3 * * *'  # 03:00 UTC nightly
  workflow_dispatch:      # manual trigger from the Actions tab
  push:
    branches: [ main ]    # any push to main → rebuild + deploy

permissions:
  contents: write
  pages: write
  id-token: write

# Prevent overlapping runs from stepping on each other's commits.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: build/requirements.txt

      - name: Install dependencies
        run: pip install -r build/requirements.txt

      - name: Fetch missing months
        # Only fetch on schedule / manual dispatch. Regular pushes just re-index
        # and redeploy what's already in the repo, to avoid hitting the API
        # when a code change lands.
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
        run: python build/fetch_guardian.py --skip-existing

      - name: Build indexes
        run: python build/build_index.py

      - name: Commit updated data
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "guardian-trends-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "data: nightly build"
            git push
          fi

  deploy:
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out (with any newly-committed data)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
