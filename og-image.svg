<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Guardian Angles OG image · OG1 from the Claude Design brand explorations.
       Front-page chart composition: title block top-left, stat block top-right,
       four weaving series across the lower half on newsprint paper, yellow axis.
       Paths are deterministic (seeded) from the design source. -->

  <rect width="1200" height="630" fill="#F4EFE6"/>

  <!-- top masthead rule -->
  <rect x="0" y="0" width="1200" height="8" fill="#052962"/>

  <!-- faint newsprint grid -->
  <g opacity="0.06" stroke="#121212" stroke-width="1">
    <line x1="100"  y1="0" x2="100"  y2="630"/>
    <line x1="200"  y1="0" x2="200"  y2="630"/>
    <line x1="300"  y1="0" x2="300"  y2="630"/>
    <line x1="400"  y1="0" x2="400"  y2="630"/>
    <line x1="500"  y1="0" x2="500"  y2="630"/>
    <line x1="600"  y1="0" x2="600"  y2="630"/>
    <line x1="700"  y1="0" x2="700"  y2="630"/>
    <line x1="800"  y1="0" x2="800"  y2="630"/>
    <line x1="900"  y1="0" x2="900"  y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="1100" y1="0" x2="1100" y2="630"/>
    <line x1="1200" y1="0" x2="1200" y2="630"/>
  </g>

