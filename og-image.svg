  <!-- yellow baseline / axis -->
  <rect x="80" y="598" width="1040" height="4" fill="#FFE500"/>

  <!-- axis ticks -->
  <g font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#746d61">
    <text x="80"   y="620" text-anchor="start">2015</text>
    <text x="600"  y="620" text-anchor="middle">2020</text>
    <text x="1120" y="620" text-anchor="end">2025</text>
  </g>

  <!-- title block (left) -->
  <g font-family="'GH Guardian Headline', 'Guardian Egyptian Web', Georgia, serif" fill="#052962">
    <text x="80" y="150" font-weight="700" font-size="96" letter-spacing="-3">Guardian</text>
    <text x="80" y="240" font-weight="700" font-style="italic" font-size="96" letter-spacing="-3">Angles</text>
  </g>
  <rect x="80" y="262" width="260" height="6" fill="#FFE500"/>
  <g font-family="'GH Guardian Headline', Georgia, serif" fill="#121212" font-size="26">
    <text x="80" y="312">How often has the Guardian written about</text>
    <text x="80" y="346">your topic — and from which <tspan font-style="italic">angle?</tspan></text>
  </g>

  <!-- stat block (right) -->
  <g>
    <text x="1120" y="150" text-anchor="end"
          font-family="'GH Guardian Headline', Georgia, serif"
          font-weight="700" font-size="88" fill="#121212" letter-spacing="-2">1M+</text>
    <text x="1120" y="182" text-anchor="end"
          font-family="'Guardian Sans', system-ui, sans-serif"
          font-size="15" fill="#746d61" letter-spacing="1.2">HEADLINES INDEXED</text>
    <text x="1120" y="214" text-anchor="end"
          font-family="'Guardian Sans', system-ui, sans-serif"
          font-size="15" fill="#746d61" letter-spacing="1.2">A DECADE · FOUR SECTIONS</text>
  </g>
</svg>
