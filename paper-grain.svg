<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Newsprint grain: fine fractal noise, seamless tile, low opacity.
       Used as a repeating background-image on body so the paper has a
       real tooth instead of a lattice of CSS dots. -->
  <filter id="grain" x="0" y="0" width="100%" height="100%">
    <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
    <feColorMatrix values="0 0 0 0 0.07
                           0 0 0 0 0.07
                           0 0 0 0 0.07
                           0 0 0 0.5 0"/>
  </filter>
  <rect width="100%" height="100%" filter="url(#grain)" opacity="0.45"/>
</svg>
